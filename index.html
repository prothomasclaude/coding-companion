<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 4px;

    }

    #sprite-wrapper {
      position: relative;

    }

    #drag-handle {
      position: absolute;
      cursor: grab;
      -webkit-app-region: drag;
      z-index: 5;
    }

    #drag-handle:active {
      cursor: grabbing;
    }

    #sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      pointer-events: none;
      transform-origin: bottom center;
      object-fit: contain;
    }

    #speech-bubble {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: #1a1a2e;
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 10px;
      white-space: nowrap;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border: 1.5px solid #e0e0e0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 10;
    }

    #speech-bubble.visible { opacity: 1; }

    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid white;
    }

    .thinking-aura {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,104,238,0.25) 0%, transparent 70%);
      animation: pulse-aura 1.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-aura {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
      50% { transform: translateX(-50%) scale(1.2); opacity: 1; }
    }

    .star-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: star-fly 0.8s ease-out forwards;
    }

    @keyframes star-fly {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="aura" class="thinking-aura" style="display:none"></div>
    <div id="sprite-wrapper">
      <div id="speech-bubble"></div>
      <div id="drag-handle"></div>
      <img id="sprite" src="" alt="Companion">
    </div>
  </div>

  <script>
    const spriteEl = document.getElementById('sprite');
    const wrapper = document.getElementById('sprite-wrapper');
    const bubble = document.getElementById('speech-bubble');
    const aura = document.getElementById('aura');
    const container = document.getElementById('container');
    const path = require('path');
    const fs = require('fs');
    const { ipcRenderer } = require('electron');

    // ===== State =====
    let manifest = null;
    let spritesDir = '';
    let anims = {};
    let lines = {};
    let messages = {};
    let sounds = {};
    let effects = {};
    let stateConfig = {};

    let currentState = 'idle';
    let currentAnim = '';
    let frameIndex = 0;
    let animTimer = null;
    let bubbleTimer = null;
    let poseTimer = null;
    let swapTimer = null;
    let currentAudio = null;

    // ===== Helpers =====
    function range(start, end) {
      const arr = [];
      for (let i = start; i <= end; i++) arr.push(i);
      return arr;
    }

    function getFramePath(n) {
      const filename = manifest.framePattern.replace('{n}', n);
      return 'file://' + path.join(spritesDir, filename);
    }

    function preloadFrames() {
      Object.values(anims).forEach(anim => {
        anim.frameNums.forEach(n => {
          const img = new Image();
          img.src = getFramePath(n);
        });
      });
    }

    // ===== Load Manifest =====
    function loadManifest(spriteName) {
      spritesDir = path.join(__dirname, 'sprites', spriteName);
      const manifestPath = path.join(spritesDir, 'manifest.json');
      manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

      // Build animations with expanded frame ranges
      anims = {};
      for (const [name, def] of Object.entries(manifest.animations)) {
        anims[name] = {
          frameNums: range(def.frames[0], def.frames[1]),
          speed: def.speed
        };
      }

      lines = manifest.lines || {};
      messages = manifest.messages || {};
      sounds = manifest.sounds || {};
      effects = manifest.effects || {};
      stateConfig = manifest.states || {};

      // Apply display size — browser upscales small sprites via image-rendering: pixelated
      spriteEl.style.width = manifest.display.width + 'px';
      spriteEl.style.height = manifest.display.height + 'px';

      // Position drag handle on character hit area
      const dragHandle = document.getElementById('drag-handle');
      const hit = manifest.hitArea;
      if (hit) {
        dragHandle.style.left = hit.x + 'px';
        dragHandle.style.top = hit.y + 'px';
        dragHandle.style.width = hit.width + 'px';
        dragHandle.style.height = hit.height + 'px';
      } else {
        dragHandle.style.left = '0';
        dragHandle.style.top = '0';
        dragHandle.style.width = manifest.display.width + 'px';
        dragHandle.style.height = manifest.display.height + 'px';
      }

      preloadFrames();
    }

    // ===== Animation Playback =====
    function playAnim(animName, loop = true) {
      if (currentAnim === animName) return;
      currentAnim = animName;
      frameIndex = 0;

      if (animTimer) clearInterval(animTimer);

      const anim = anims[animName];
      if (!anim) return;

      const tick = () => {
        const n = anim.frameNums[frameIndex];
        spriteEl.src = getFramePath(n);
        frameIndex++;
        if (frameIndex >= anim.frameNums.length) {
          if (loop) {
            frameIndex = 0;
          } else {
            clearInterval(animTimer);
            animTimer = null;
          }
        }
      };

      tick();
      animTimer = setInterval(tick, anim.speed);
    }

    // ===== Speech Bubbles =====
    function showBubble(text) {
      if (!text) return;
      bubble.textContent = text;
      bubble.classList.add('visible');
      if (bubbleTimer) clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), 2500);
    }

    // ===== Audio =====
    function playSoundFile(file) {
      if (!file) return;
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      const src = 'file://' + path.join(spritesDir, file);
      currentAudio = new Audio(src);
      currentAudio.volume = 0.5;
      currentAudio.play().catch(() => {});
    }

    // ===== Paired line (text + sound together) =====
    function playLine(pool) {
      // New format: lines[state] = [{ text, sound }, ...]
      if (lines[pool] && lines[pool].length > 0) {
        const line = lines[pool][Math.floor(Math.random() * lines[pool].length)];
        showBubble(line.text);
        playSoundFile(line.sound);
        return;
      }
      // Fallback: old separate messages/sounds format
      const msgs = messages[pool];
      if (msgs && msgs.length > 0) {
        showBubble(msgs[Math.floor(Math.random() * msgs.length)]);
      }
      const snds = sounds[pool];
      if (snds && snds.length > 0) {
        playSoundFile(snds[Math.floor(Math.random() * snds.length)]);
      }
    }

    // ===== Particles =====
    function spawnParticle() {
      const particle = document.createElement('div');
      particle.className = 'star-particle';
      particle.style.background = effects.particleColor || '#ffd700';
      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 60;
      particle.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      particle.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      particle.style.left = `${container.offsetWidth / 2 + (Math.random() - 0.5) * 40}px`;
      particle.style.bottom = `${30 + Math.random() * 50}px`;
      container.appendChild(particle);
      setTimeout(() => particle.remove(), 800);
    }

    // ===== State Machine =====
    window.updateState = function(newState) {
      if (newState === currentState) return;
      const prevState = currentState;
      currentState = newState;

      if (swapTimer) { clearInterval(swapTimer); swapTimer = null; }

      if (newState === 'working') {
        const cfg = stateConfig.working || {};
        if (effects.thinkingAura) aura.style.display = 'block';

        const workAnims = cfg.animations || ['idle'];
        const pick = workAnims[Math.floor(Math.random() * workAnims.length)];
        playAnim(pick, cfg.loop !== false);
        playLine('working');

        if (cfg.swapInterval && workAnims.length > 1) {
          swapTimer = setInterval(() => {
            const next = workAnims[Math.floor(Math.random() * workAnims.length)];
            currentAnim = '';
            playAnim(next, true);
            if (Math.random() < 0.3) playLine('working');
          }, cfg.swapInterval);
        }
      } else if (newState === 'idle') {
        aura.style.display = 'none';

        if (prevState === 'working') {
          const finishedCfg = stateConfig.finished || {};
          currentState = 'finished';
          if (effects.thinkingAura) aura.style.display = 'block';
          playAnim(finishedCfg.animation || 'idle', finishedCfg.loop !== false);
          playLine('finished');

          if (effects.poseParticles) {
            for (let i = 0; i < 8; i++) {
              setTimeout(() => spawnParticle(), i * 120);
            }
          }

          if (poseTimer) clearTimeout(poseTimer);
          poseTimer = setTimeout(() => {
            currentState = 'idle';
            aura.style.display = 'none';

            const then = finishedCfg.then;
            if (then) {
              playAnim(then.animation, then.loop !== undefined ? then.loop : false);
              playLine('victory');
              if (then.thenIdle) {
                const thenAnim = anims[then.animation];
                const duration = thenAnim ? thenAnim.frameNums.length * thenAnim.speed + 200 : 2000;
                setTimeout(() => {
                  if (currentState === 'idle') {
                    const idleCfg = stateConfig.idle || {};
                    playAnim(idleCfg.animation || 'idle', true);
                  }
                }, duration);
              }
            } else {
              const idleCfg = stateConfig.idle || {};
              playAnim(idleCfg.animation || 'idle', true);
            }
            playLine('idle');
          }, finishedCfg.duration || 5000);
        } else {
          const idleCfg = stateConfig.idle || {};
          playAnim(idleCfg.animation || 'idle', true);
          playLine('idle');
        }
      }
    };

    // Random bubbles
    setInterval(() => {
      if (currentState === 'idle' && Math.random() < 0.15) playLine('idle');
      if (currentState === 'finished' && Math.random() < 0.3) {
        playLine('finished');
        if (effects.poseParticles) spawnParticle();
      }
    }, 3000);

    // ===== Reload (called by main process on character switch) =====
    window.reloadSprite = function(spriteName) {
      if (animTimer) clearInterval(animTimer);
      if (swapTimer) clearInterval(swapTimer);
      if (poseTimer) clearTimeout(poseTimer);
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAnim = '';
      currentState = 'idle';

      spriteEl.style.opacity = '0';
      setTimeout(() => {
        loadManifest(spriteName);
        const idleCfg = stateConfig.idle || {};
        playAnim(idleCfg.animation || 'idle', true);
        spriteEl.style.opacity = '1';
        playLine('greeting');
      }, 200);
    };

    // ===== Init (called by main process with selected sprite name) =====
    window.initCompanion = function(spriteName) {
      loadManifest(spriteName);
      spriteEl.style.transition = 'opacity 0.2s ease';
      const idleCfg = stateConfig.idle || {};
      playAnim(idleCfg.animation || 'idle', true);
      setTimeout(() => {
        playLine('greeting');
      }, 1000);
    };
  </script>
</body>
</html>
