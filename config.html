<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Coding Companion - Select Character</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 20px 24px 12px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px 16px;
    }

    .grid::-webkit-scrollbar { width: 6px; }
    .grid::-webkit-scrollbar-track { background: transparent; }
    .grid::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }

    /* Card */
    .card {
      background: #16162a;
      border: 2px solid #1e1e3a;
      border-radius: 14px;
      padding: 16px 12px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .card:hover {
      border-color: #4a3fa0;
      background: #1a1a36;
      transform: translateY(-2px);
    }

    .card.selected {
      border-color: #7b68ee;
      background: #1c1c3e;
      box-shadow: 0 0 20px rgba(123, 104, 238, 0.25), inset 0 0 20px rgba(123, 104, 238, 0.05);
    }

    .card.selected::after {
      content: '\2713';
      position: absolute;
      top: 8px;
      right: 10px;
      width: 20px;
      height: 20px;
      background: #7b68ee;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    .preview-container {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #12121f;
      border-radius: 8px;
      overflow: hidden;
    }

    .card img {
      max-width: 100%;
      max-height: 72px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .card-info {
      text-align: center;
    }

    .card .name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      display: block;
    }

    .card .author {
      font-size: 11px;
      color: #666;
      display: block;
      margin-top: 2px;
    }

    .card .frame-count {
      font-size: 10px;
      color: #444;
      display: block;
      margin-top: 2px;
    }

    /* Empty state */
    .empty {
      text-align: center;
      color: #555;
      padding: 60px 40px;
      font-size: 13px;
      line-height: 1.8;
    }

    .empty code {
      background: #1a1a30;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #7b68ee;
    }

    /* Footer */
    .footer {
      padding: 12px 24px 16px;
      border-top: 1px solid #1a1a30;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer .status {
      font-size: 11px;
      color: #555;
    }

    .footer .status .active-name {
      color: #7b68ee;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Choose your Companion</h1>
    <p>Click a character to switch instantly</p>
  </div>
  <div class="grid" id="grid"></div>
  <div class="footer">
    <span class="status">Active: <span class="active-name" id="active-name">—</span></span>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const grid = document.getElementById('grid');
    const activeName = document.getElementById('active-name');

    let selectedId = null;
    let packsData = [];

    async function loadPacks() {
      const [packs, config] = await Promise.all([
        ipcRenderer.invoke('get-sprite-packs'),
        ipcRenderer.invoke('get-config'),
      ]);

      packsData = packs;
      selectedId = config.selectedSprite;

      if (packs.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            No sprite packs found.<br><br>
            Add folders with PNG frames + <code>manifest.json</code><br>
            to <code>~/.claude/coding-companion/sprites/</code>
          </div>
        `;
        activeName.textContent = '—';
        return;
      }

      grid.innerHTML = '';
      for (const pack of packs) {
        const card = document.createElement('div');
        card.className = 'card' + (pack.id === selectedId ? ' selected' : '');
        card.dataset.id = pack.id;
        card.innerHTML = `
          <div class="preview-container">
            <img src="${pack.preview}" alt="${pack.name}">
          </div>
          <div class="card-info">
            <span class="name">${pack.name}</span>
            <span class="author">${pack.author || ''}</span>
          </div>
        `;
        card.addEventListener('click', () => selectPack(pack.id));
        grid.appendChild(card);
      }

      const active = packs.find(p => p.id === selectedId);
      activeName.textContent = active ? active.name : '—';
    }

    async function selectPack(id) {
      if (id === selectedId) return;
      selectedId = id;

      // Update visual selection immediately
      document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('selected', c.dataset.id === id);
      });

      const active = packsData.find(p => p.id === id);
      activeName.textContent = active ? active.name : '—';

      await ipcRenderer.invoke('select-sprite', id);
    }

    loadPacks();
  </script>
</body>
</html>
