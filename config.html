<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Coding Companion - Select Character</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }

    .card {
      background: #16213e;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .card:hover {
      border-color: #7b68ee;
      background: #1a2744;
    }

    .card.selected {
      border-color: #7b68ee;
      background: #1f2d50;
      box-shadow: 0 0 12px rgba(123, 104, 238, 0.3);
    }

    .card img {
      width: 100px;
      height: 60px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .card .name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .card .author {
      font-size: 10px;
      color: #888;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 40px;
      font-size: 13px;
    }

    .empty code {
      background: #16213e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>Choose your Coding Companion</h1>
  <div class="grid" id="grid"></div>

  <script>
    const { ipcRenderer } = require('electron');
    const grid = document.getElementById('grid');

    let selectedId = null;

    async function loadPacks() {
      const [packs, config] = await Promise.all([
        ipcRenderer.invoke('get-sprite-packs'),
        ipcRenderer.invoke('get-config'),
      ]);

      selectedId = config.selectedSprite;

      if (packs.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            No sprite packs found.<br><br>
            Add folders with PNG frames + <code>manifest.json</code><br>
            to <code>~/.claude/coding-companion/sprites/</code>
          </div>
        `;
        return;
      }

      grid.innerHTML = '';
      for (const pack of packs) {
        const card = document.createElement('div');
        card.className = 'card' + (pack.id === selectedId ? ' selected' : '');
        card.innerHTML = `
          <img src="${pack.preview}" alt="${pack.name}">
          <span class="name">${pack.name}</span>
          <span class="author">${pack.author || ''}</span>
        `;
        card.addEventListener('click', () => selectPack(pack.id));
        grid.appendChild(card);
      }
    }

    async function selectPack(id) {
      if (id === selectedId) return;
      selectedId = id;

      // Update visual selection
      document.querySelectorAll('.card').forEach((c, i) => {
        // Re-check by finding the matching card
        c.classList.toggle('selected', c.querySelector('.name')?.textContent ===
          [...document.querySelectorAll('.card')].find(el => el === c)?.dataset?.id);
      });

      // Simpler: just reload
      await ipcRenderer.invoke('select-sprite', id);
      loadPacks(); // Refresh to update selection highlight
    }

    loadPacks();
  </script>
</body>
</html>
